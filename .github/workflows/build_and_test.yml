name: CI (build and test)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  manifest:
    name: Check manifest
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: python -m pip install -e .[test]

      - name: Check if manifest is up to date
        run: fractal-manifest check --package fractal_lif_converters

  tests:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    name: "Core, Python ${{ matrix.python-version }}, ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: python -m pip install -e .[test]

      - name: Test core library with pytest
        run: python -m pytest tests

      - name: Coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-22.04'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: /home/runner/work/fractal-lif-converters/fractal-lif-converters/coverage.xml

  deploy:
    name: Deploy
    needs: [tests, manifest]
    if: success() && startsWith(github.ref, 'refs/tags/') && github.event_name != 'schedule'
    runs-on: ubuntu-latest

    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing on PyPi
      # see https://docs.pypi.org/trusted-publishers/
      id-token: write
      # This permission allows writing releases
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: 👷 Build
        run: |
          python -m pip install build
          python -m build

      - name: 🚢 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: "./dist/*"
