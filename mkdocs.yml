site_name: "Fractal LIF Converters"
site_description: "Fractal tasks to convert Leica LIF files to OME-Zarr format."
repo_name: "fractal-lif-converters"
repo_url: "https://github.com/fractal-analytics-platform/fractal-lif-converters"
copyright: "Copyright &copy; 2025-, BioVisionCenter UZH"

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.tooltips
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.footer
    - toc.follow
    - search.suggest

extra:
  version:
    provider: mike

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - How to Run the Converters: how_to_run_the_converters.md
  - Converters:
    - Overview: converters/index.md
    - LIF Plate: converters/lif_plate.md
    - LIF Image: converters/lif_image.md
  - Condition Tables: condition_tables.md
  - Changelog: changelog.md
